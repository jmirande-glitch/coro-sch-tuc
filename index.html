<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="theme-color" content="#FFFFFF">
<style>:root{color-scheme:only light;}</style>
<title>Coro Dominical · Schoenstatt Tucumán</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: only light;
  --azul:#7C9CBF;       /* celeste acero del flyer */
  --azul-deep:#3B5A7A;
  --marino:#1F3A57;     /* azul marino títulos */
  --dorado:#C9A24B;
  --dorado-soft:#F3E7C9;
  --bg:#F4F6F9;          /* fondo gris muy claro, estilo MP */
  --card:#FFFFFF;
  --ink:#1C2630;
  --muted:#7A8896;
  --line:#E7EBF0;
  --azul-bg:#EAF1FA;     /* fondo botones tipo MP */
  --verde:#3E8E5B;
  --verde-bg:#E7F5EC;
  --rojo:#C0463A;
  --rojo-bg:#FBEAE8;
  --radius:18px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;margin:0;font-weight:700;letter-spacing:-0.01em;}
.script{font-family:'Caveat',cursive;font-weight:700;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;}
::selection{background:var(--dorado-soft);}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
}

.shell{max-width:1080px;margin:0 auto;padding:0 20px;}

/* ===== Topbar ===== */
.topbar{
  position:sticky;top:0;z-index:50;
  background:var(--card);
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;max-width:1080px;margin:0 auto;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(160deg, var(--azul) 0%, var(--marino) 100%);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Poppins',sans-serif;font-weight:800;font-size:14px;
  flex-shrink:0;
}
.brand-text h1{font-size:16px;color:var(--marino);line-height:1.1;}
.brand-text span{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.toplinks{display:flex;gap:4px;align-items:center;}
.toplinks button{
  color:var(--azul-deep);opacity:.7;font-size:13.5px;font-weight:600;
  padding:9px 14px;border-radius:100px;transition:opacity .15s, background .15s;
  white-space:nowrap;
}
.toplinks button:hover{opacity:1;background:var(--azul-bg);}
.toplinks button.active{opacity:1;background:var(--azul-bg);color:var(--marino);}
.lockbtn{
  display:flex;align-items:center;gap:6px;
  background:var(--marino);color:#fff;
  padding:9px 15px;border-radius:100px;font-weight:600;font-size:13px;
}
.lockbtn.alt{background:var(--azul-bg);color:var(--marino);}
@media (max-width:720px){
  .toplinks{display:none;}
  .brand-text span{display:none;}
}

.bottomnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:var(--card);border-top:1px solid var(--line);
  padding:6px 4px env(safe-area-inset-bottom,6px);
  box-shadow:0 -4px 16px rgba(31,58,87,.06);
}
.bottomnav-inner{display:flex;justify-content:space-around;max-width:1080px;margin:0 auto;}
.bottomnav button{
  color:var(--muted);font-size:10.5px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;flex:1;
}
.bottomnav button.active{color:var(--marino);}
.bottomnav button .ic{font-size:18px;}
@media (max-width:720px){
  .bottomnav{display:block;}
  body{padding-bottom:62px;}
}

/* ===== Layout ===== */
.page{padding:24px 20px 60px;max-width:1080px;margin:0 auto;}
.page-head{margin-bottom:20px;}
.page-head .eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--azul-deep);margin-bottom:4px;display:block;
}
.page-head h2{font-size:25px;color:var(--marino);}
.page-head p{margin-top:6px;font-size:14px;color:var(--muted);max-width:560px;line-height:1.5;}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:0 1px 2px rgba(31,58,87,.04);
}
.tile{
  background:var(--azul-bg);border-radius:16px;padding:16px 10px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  text-align:center;
}
.tile .ic{font-size:24px;}
.tile .lbl{font-size:12.5px;font-weight:600;color:var(--marino);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media (max-width:760px){.grid2,.grid3{grid-template-columns:1fr;}}

.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 18px;border-radius:100px;font-weight:600;font-size:13.5px;
  transition:transform .12s, filter .12s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--marino);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-gold{background:var(--dorado);color:#fff;}
.btn-soft{background:var(--azul-bg);color:var(--marino);}
.btn-ghost{background:var(--bg);color:var(--ink);}
.btn-outline{background:none;border:1.5px solid var(--azul-deep);color:var(--azul-deep);}
.btn-danger{background:none;border:1.5px solid var(--rojo);color:var(--rojo);}
.btn-sm{padding:7px 13px;font-size:12.5px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;
  letter-spacing:.01em;
}
.tag-azul{background:var(--azul-bg);color:var(--azul-deep);}
.tag-dorado{background:var(--dorado-soft);color:#8a6c1f;}
.tag-verde{background:var(--verde-bg);color:var(--verde);}
.tag-rojo{background:var(--rojo-bg);color:var(--rojo);}

input,select,textarea{
  width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--line);
  font-family:'Inter',sans-serif;font-size:14px;background:#fff;color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--azul);outline-offset:1px;border-color:var(--azul);}
label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;display:block;margin-bottom:5px;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty h3{color:var(--ink);margin-bottom:6px;font-size:16px;}
.empty p{font-size:13.5px;margin-bottom:14px;}

.divider{display:flex;align-items:center;gap:10px;margin:22px 0 14px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.divider span{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--azul-deep);}

#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--marino);color:#fff;padding:11px 20px;border-radius:100px;
  font-size:13.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;
  transition:opacity .25s, transform .25s;box-shadow:0 8px 24px rgba(31,58,87,.25);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
@media (max-width:720px){#toast{bottom:78px;}}
.hidden{display:none !important;}

.lockscreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;background:linear-gradient(160deg, var(--azul) 0%, var(--marino) 100%);
}
.lockcard{
  background:#fff;border-radius:22px;padding:36px 30px;max-width:380px;width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.25);text-align:center;
}
.lockcard .mark{
  width:50px;height:50px;border-radius:14px;background:var(--azul-bg);color:var(--marino);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  font-size:24px;
}
.lockcard h2{font-size:20px;color:var(--marino);margin-bottom:6px;}
.lockcard p{font-size:13.5px;color:var(--muted);margin-bottom:20px;}
.lockcard input{text-align:center;font-size:17px;letter-spacing:.08em;margin-bottom:12px;}
.lockcard .err{color:var(--rojo);font-size:12.5px;font-weight:600;height:16px;margin-bottom:4px;}

.winnerCard{
  background:linear-gradient(135deg, var(--dorado-soft) 0%, #fff 65%);
  border:1px solid var(--dorado-soft);
}
.barTrack{height:7px;background:var(--bg);border-radius:6px;overflow:hidden;}
.barFill{height:100%;background:var(--azul);border-radius:6px;transition:width .4s ease;}
.barFill.gold{background:var(--dorado);}

::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}
svg{vertical-align:middle;display:inline-block;}
.bottomnav button .ic svg{display:block;}
.lockbtn svg{flex-shrink:0;}

/* Home público: 4 botones grandes */
.homeGrid{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
  min-height:calc(100vh - 230px);
}
@media (max-width:640px){
  .homeGrid{grid-template-columns:1fr;min-height:calc(100vh - 200px);}
}
.homeTile{
  border-radius:22px;padding:22px 16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  text-align:center;border:1px solid var(--line);
  transition:transform .12s, box-shadow .12s;
  min-height:150px;
}
.homeTile:active{transform:scale(.97);}
.homeTile-ic{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;}
.homeTile-tit{font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;}
.homeTile-sub{font-size:12.5px;opacity:.75;}
.homeTile-azul{background:var(--azul-bg);color:var(--marino);}
.homeTile-azul .homeTile-ic{background:#fff;color:var(--azul-deep);}
.homeTile-dorado{background:var(--dorado-soft);color:#7a5c14;}
.homeTile-dorado .homeTile-ic{background:#fff;color:var(--dorado);}
.homeTile-verde{background:var(--verde-bg);color:#2c5b3f;}
.homeTile-verde .homeTile-ic{background:#fff;color:var(--verde);}
.homeTile-rojo{background:var(--rojo-bg);color:#8a3327;}
.homeTile-rojo .homeTile-ic{background:#fff;color:var(--rojo);}

/* Tiles de momento litúrgico (elegir canciones) */
.momentoTile{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px;text-align:left;
}
.momentoTile-left{display:flex;align-items:center;gap:12px;}
.momentoTile-check{
  width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;
}
.momentoTile-check.done{background:var(--verde);border-color:var(--verde);}
.momentoTile-tit{display:block;font-weight:700;font-size:14.5px;color:var(--marino);}
.momentoTile-sub{display:block;font-size:12.5px;color:var(--muted);margin-top:2px;}

/* Estrellas */
.starRow{display:flex;gap:6px;}
.starBtn{color:var(--line);transition:transform .1s;}
.starBtn:active{transform:scale(1.15);}
.starBtn.on{color:var(--dorado);}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
/* =========================================================
   CAPA DE DATOS — localStorage hoy, Supabase mañana.
========================================================= */
const DB_KEY = 'coro_schoenstatt_v2';
const PASSCODE = 'coro2026';

const MOMENTOS = ['Entrada','Perdón','Gloria','Salmo','Aleluya','Ofrendas','Santo','Cordero','Comunión','Acción de gracias','Salida'];
const MOMENTOS_VOTABLES = ['Entrada','Ofrendas','Comunión','Acción de gracias'];
const LABEL_MOMENTO = {Entrada:'Entrada', Ofrendas:'Ofertorio', 'Comunión':'Comunión', 'Acción de gracias':'Acción de gracias'};

/* ===== Enlaces externos — completar con los links reales ===== */
const LINKS = {
  formularioPostulacion: 'https://forms.gle/REEMPLAZAR-FORM-POSTULACION',
  formularioDonacion: 'https://donaronline.org/fundacion-mater-admirabilis/sumate-con-tu-aporte',
  whatsappPadreAgustin: 'https://wa.me/5493812229966?text=' + encodeURIComponent('Padre Agus! Acabo de hacer una donación para el coro de [monto] por [transferencia / donación online]'),
  aliasDonacion: 'fundacion.mater',
};
const ROLES = ['Voz','Guitarra','Cajón peruano','Teclado','Otro instrumento'];
const HABILIDADES = ['Voz','Guitarra','Cajón peruano','Teclado'];

function cid(){return 'c_'+Math.random().toString(36).slice(2,9);}
function pid(){return 'p_'+Math.random().toString(36).slice(2,9);}
function did(){return 'd_'+Math.random().toString(36).slice(2,9);}

function seed(){
  const canciones = [
    {id:cid(), titulo:'Pescador de Hombres', autor:'Cesáreo Gabaráin', momento:'Entrada', tono:'D', letra:'Tú has venido a la orilla,\nno has buscado ni a sabios ni a ricos,\ntan solo quieres que yo te siga.\n\nSeñor, me has mirado a los ojos,\nsonriendo has dicho mi nombre,\nen la arena he dejado mi barca,\njunto a ti buscaré otro mar.'},
    {id:cid(), titulo:'Vienen con Alegría', autor:'Trad.', momento:'Entrada', tono:'G', letra:'Vienen con alegría, Señor, cantando vienen,\nlos que caminan por la vida, Señor, sembrando tu paz.'},
    {id:cid(), titulo:'Tu Pueblo Te Aclama', autor:'Trad.', momento:'Entrada', tono:'D', letra:'Tu pueblo te aclama, Señor de la vida,\nte alaba, te canta, su Dios y Señor.'},
    {id:cid(), titulo:'Tras de Ti', autor:'Trad.', momento:'Entrada', tono:'A', letra:'Tras de ti, tras de ti, tras de tus huellas, Señor,\nyo quiero caminar.'},
    {id:cid(), titulo:'Tu Fidelidad', autor:'Trad.', momento:'Entrada', tono:'C', letra:'Tu fidelidad es grande, es grande,\ntu fidelidad de generación en generación.'},
    {id:cid(), titulo:'Perdón Oh Dios Mío', autor:'Trad.', momento:'Perdón', tono:'Em', letra:'Perdón, oh Dios mío, perdón e indulgencia,\nperdón y clemencia, perdón y piedad.'},
    {id:cid(), titulo:'Gloria a Dios', autor:'Trad.', momento:'Gloria', tono:'G', letra:'Gloria, gloria, gloria a Dios en las alturas,\ny en la tierra paz a los hombres que ama el Señor.'},
    {id:cid(), titulo:'El Señor es mi Pastor', autor:'Salmo 22', momento:'Salmo', tono:'C', letra:'El Señor es mi pastor, nada me puede faltar.\nEn verdes praderas me hace reposar.'},
    {id:cid(), titulo:'Aleluya de Pascua', autor:'Trad.', momento:'Aleluya', tono:'D', letra:'Aleluya, aleluya, aleluya, aleluya.'},
    {id:cid(), titulo:'Te Presentamos el Vino y el Pan', autor:'Trad.', momento:'Ofrendas', tono:'G', letra:'Te presentamos el vino y el pan,\nfruto del trabajo del hombre,\nte lo ofrecemos Señor, en este altar.'},
    {id:cid(), titulo:'Tomad y Comed', autor:'Trad.', momento:'Ofrendas', tono:'D', letra:'Tomad y comed, este es mi cuerpo,\ntomad y bebed, esta es mi sangre.'},
    {id:cid(), titulo:'Como el Grano de Trigo', autor:'Trad.', momento:'Ofrendas', tono:'Am', letra:'Como el grano de trigo que muere para dar fruto,\nasí Señor enséñanos a darnos como tú.'},
    {id:cid(), titulo:'Te Ofrecemos Señor', autor:'Trad.', momento:'Ofrendas', tono:'C', letra:'Te ofrecemos Señor, con el pan y el vino,\nnuestro trabajo de cada día.'},
    {id:cid(), titulo:'Este es Mi Cuerpo', autor:'Trad.', momento:'Ofrendas', tono:'G', letra:'Este es mi cuerpo entregado por ustedes,\nhagan esto en memoria mía.'},
    {id:cid(), titulo:'Santo es el Señor', autor:'Trad.', momento:'Santo', tono:'D', letra:'Santo, santo, santo es el Señor,\nDios del universo.\nLlenos están los cielos y la tierra de tu gloria.'},
    {id:cid(), titulo:'Cordero de Dios', autor:'Trad.', momento:'Cordero', tono:'Em', letra:'Cordero de Dios, que quitas el pecado del mundo,\nten piedad de nosotros.'},
    {id:cid(), titulo:'Pan de Vida', autor:'Trad.', momento:'Comunión', tono:'C', letra:'Yo soy el pan de vida,\nel que viene a mí no tendrá hambre.'},
    {id:cid(), titulo:'Una Espiga', autor:'Cesáreo Gabaráin', momento:'Comunión', tono:'Em', letra:'Una espiga dorada por el sol,\nel racimo que corta el viandante,\nllevan vino y pan para la fiesta del Señor.'},
    {id:cid(), titulo:'Tantum Ergo', autor:'Trad.', momento:'Comunión', tono:'G', letra:'Tantum ergo sacramentum, veneremur cernui.'},
    {id:cid(), titulo:'Cerca de Ti Señor', autor:'Trad.', momento:'Comunión', tono:'D', letra:'Cerca de ti Señor, quiero vivir,\ncerca de ti Señor, quiero morir.'},
    {id:cid(), titulo:'Alma Misionera', autor:'Trad.', momento:'Comunión', tono:'Am', letra:'Señor, toma mi vida nueva,\nantes de que la espera desgaste años en mí.'},
    {id:cid(), titulo:'Gracias Señor', autor:'Trad.', momento:'Acción de gracias', tono:'G', letra:'Gracias, Señor, por la vida,\ngracias por tu amor.'},
    {id:cid(), titulo:'Te Damos Gracias', autor:'Trad.', momento:'Acción de gracias', tono:'D', letra:'Te damos gracias, Padre, por tu inmenso amor,\npor darnos a tu Hijo, nuestro Salvador.'},
    {id:cid(), titulo:'Demos Gracias al Señor', autor:'Trad.', momento:'Acción de gracias', tono:'C', letra:'Demos gracias al Señor, porque es bueno,\nporque es eterna su misericordia.'},
    {id:cid(), titulo:'Mil Gracias Te Damos', autor:'Trad. Schoenstatt', momento:'Acción de gracias', tono:'G', letra:'Mil gracias te damos, Señor de bondad,\npor todos tus dones y tu fidelidad.'},
    {id:cid(), titulo:'Madre Tres Veces Admirable', autor:'Trad. Schoenstatt', momento:'Salida', tono:'D', letra:'Madre, tres veces admirable de Schoenstatt,\nbendice y protege a tu familia.'},
    {id:cid(), titulo:'Id y Anunciad', autor:'Trad.', momento:'Salida', tono:'A', letra:'Id y anunciad, lo que habéis visto y oído,\nid y anunciad, la Buena Nueva del Señor.'},
    {id:cid(), titulo:'Vayan al Mundo Entero', autor:'Trad.', momento:'Salida', tono:'D', letra:'Vayan al mundo entero y proclamen el Evangelio,\nyo estaré con ustedes todos los días.'},
    {id:cid(), titulo:'María Madre Buena', autor:'Trad. Schoenstatt', momento:'Salida', tono:'C', letra:'María, Madre buena, llévanos a Jesús,\nguíanos en el camino, dame tu corazón.'},
    {id:cid(), titulo:'Anima Christi', autor:'Trad. Schoenstatt', momento:'Salida', tono:'G', letra:'Alma de Cristo, santifícame,\nCuerpo de Cristo, salvame.'},
  ];
  return {
    canciones,
    domingos: [],
    personas: [
      {id:pid(), nombre:'Javier', roles:['Voz'], whatsapp:'', foto:''},
      {id:pid(), nombre:'María', roles:['Voz'], whatsapp:'', foto:''},
      {id:pid(), nombre:'Lucas', roles:['Guitarra'], whatsapp:'', foto:''},
      {id:pid(), nombre:'Ana', roles:['Cajón peruano'], whatsapp:'', foto:''},
    ],
    votos: {}, // votos[domingoIso][momento][cancionId] = n
    opiniones: [], // {id, domingoIso, sonido, afinacion, canciones, comentario, fecha}
    sonidoGuia: defaultGuia(),
  };
}
function defaultGuia(){
  return { pasos: [
    {titulo:'1. Armado de la consola', detalle:'Conectar la consola a la corriente. Encender SOLO la consola primero, todo lo demás apagado.', icono:'console'},
    {titulo:'2. Micrófonos de voz', detalle:'Conectar cada micrófono con cable XLR. Subir el fader a la mitad antes de prender el micro.', icono:'mic'},
    {titulo:'3. Guitarra', detalle:'Si tiene salida de línea, usar cable de instrumento. Si no, un micrófono apuntando a la boca de la guitarra.', icono:'guitarish'},
    {titulo:'4. Cajón peruano', detalle:'Micrófono frente al parche, a 15-20 cm, levemente inclinado hacia abajo. Un poco más de ganancia porque suena bajo.', icono:'drum'},
    {titulo:'5. Monitores / bafles', detalle:'Encenderlos DESPUÉS de tener todo conectado, con volumen al mínimo, y subir de a poco.', icono:'speaker'},
    {titulo:'6. Prueba de sonido', detalle:'Cada uno prueba su canal por separado. Ajustar volumen relativo entre todos.', icono:'check'},
    {titulo:'7. Al terminar', detalle:'Apagar bafles primero, bajar faders, apagar consola. Guardar los cables enrollados sin apretar.', icono:'plug'},
  ]};
}
function loadDB(){
  let raw = localStorage.getItem(DB_KEY);
  if(!raw){ const s=seed(); localStorage.setItem(DB_KEY, JSON.stringify(s)); return s; }
  try{
    const d = JSON.parse(raw);
    if(!d.opiniones) d.opiniones = [];
    if(!d.votos) d.votos = {};
    return d;
  }catch(e){ const s=seed(); localStorage.setItem(DB_KEY, JSON.stringify(s)); return s; }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

let DB = loadDB();
let SESSION = { unlocked: sessionStorage.getItem('coro_unlocked')==='1' };

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ===== Fechas ===== */
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function fmtFecha(d){ return `${d.getDate()} de ${MESES[d.getMonth()]} ${d.getFullYear()}`; }
function isoDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function getDomingosDeMes(year, month){
  const out=[]; const d = new Date(year, month, 1);
  while(d.getMonth()===month){ if(d.getDay()===0) out.push(new Date(d)); d.setDate(d.getDate()+1); }
  return out;
}
function ensureDomingo(fechaISO){
  let dom = DB.domingos.find(x=>x.fecha===fechaISO);
  if(!dom){ dom = {id:did(), fecha:fechaISO, asignaciones:[], canciones:{}, preseleccion:{}}; DB.domingos.push(dom); saveDB(DB); }
  if(!dom.preseleccion) dom.preseleccion = {};
  return dom;
}
function getDomingo(fechaISO){ return DB.domingos.find(x=>x.fecha===fechaISO); }
function proximoDomingoISO(){
  const hoy = new Date();
  if(hoy.getDay()===0) return isoDate(hoy);
  const d = new Date(hoy); d.setDate(d.getDate() + (7 - d.getDay())); return isoDate(d);
}
function ganadorasVisibles(targetIso){
  const now = new Date();
  const target = parseISO(targetIso);
  target.setHours(12,0,0,0);
  return now >= target;
}
function chequeoMinimo(dom){
  if(!dom) return {ok:false, faltan:['4 personas','guitarra','cajón peruano'], cantidad:0};
  const n = dom.asignaciones.length;
  const tieneGuitarra = dom.asignaciones.some(a=>a.rol==='Guitarra');
  const tieneCajon = dom.asignaciones.some(a=>a.rol==='Cajón peruano');
  const faltan=[];
  if(n<4) faltan.push(`${4-n} persona(s) más`);
  if(!tieneGuitarra) faltan.push('guitarrista');
  if(!tieneCajon) faltan.push('cajón peruano');
  return {ok:faltan.length===0, faltan, cantidad:n, tieneGuitarra, tieneCajon};
}
function preseleccionDe(dom, momento){
  const ids = (dom.preseleccion && dom.preseleccion[momento]) || [];
  let cands = ids.map(id=>DB.canciones.find(c=>c.id===id)).filter(Boolean);
  if(cands.length===0){
    cands = DB.canciones.filter(c=>c.momento===momento).slice(0,5);
  }
  return cands.slice(0,5);
}
function votosDe(domIso, momento, cancionId){
  return (DB.votos[domIso] && DB.votos[domIso][momento] && DB.votos[domIso][momento][cancionId]) || 0;
}
function ganadoraDe(domIso, momento, dom){
  const cands = preseleccionDe(dom, momento);
  if(cands.length===0) return null;
  return cands.map(c=>({cancion:c, votos:votosDe(domIso,momento,c.id)})).sort((a,b)=>b.votos-a.votos)[0];
}

/* ===== Render shell ===== */
function render(){
  const app = document.getElementById('app');
  clearInterval(LIVE_TIMER);
  if(ROUTE.area==='privado' && !SESSION.unlocked){
    app.innerHTML = lockScreenHTML();
    bindLockScreen();
    return;
  }
  app.innerHTML = topbarHTML() + `<div class="page" id="pageRoot"></div>` + bottomnavHTML();
  bindTopbar();
  bindBottomnav();
  renderPage();
}
function renderPage(){
  const root = document.getElementById('pageRoot');
  const key = ROUTE.area+'/'+ROUTE.tab;
  const renderers = {
    'publico/home': pageHomePublico,
    'publico/canciones': pageCancionesPublico,
    'publico/postular': pagePostularPublico,
    'publico/opinar': pageOpinarPublico,
    'publico/donar': pageDonarPublico,
    'privado/agenda': pageAgendaPrivada,
    'privado/equipo': pageEquipo,
    'privado/repertorio': pageRepertorioAdmin,
    'privado/sonido': pageSonido,
    'privado/misa': pageVistaMisa,
    'privado/estadisticas': pageEstadisticas,
    'privado/opiniones': pageOpinionesAdmin,
  };
  const fn = renderers[key] || pageHomePublico;
  root.innerHTML = fn();
  const bindFn = window['bind_'+key.replace('/','_')];
  if(bindFn) bindFn();
  if(key==='publico/canciones'){
    LIVE_TIMER = setInterval(()=>{
      if(ROUTE.area==='publico' && ROUTE.tab==='canciones' && !usuarioInteractuando()){
        const root2 = document.getElementById('pageRoot');
        if(root2) root2.innerHTML = pageCancionesPublico();
        bind_publico_canciones();
      }
    }, 4000);
  }
}
function usuarioInteractuando(){
  const ae = document.activeElement;
  if(ae && ['SELECT','INPUT','TEXTAREA'].includes(ae.tagName)) return true;
  return (Date.now() - CANCIONES_ULTIMA_INTERACCION) < 5000;
}
window.addEventListener('storage', (e)=>{
  if(e.key===DB_KEY){
    DB = loadDB();
    if(ROUTE.area==='publico' && ROUTE.tab==='canciones' && !usuarioInteractuando()){
      const root2 = document.getElementById('pageRoot');
      if(root2){ root2.innerHTML = pageCancionesPublico(); bind_publico_canciones(); }
    }
  }
});

function bindLockScreen(){
  const inp = document.getElementById('lockInput');
  const btn = document.getElementById('lockBtn');
  const err = document.getElementById('lockErr');
  const tryUnlock = ()=>{
    if(inp.value === PASSCODE){ SESSION.unlocked = true; sessionStorage.setItem('coro_unlocked','1'); render(); }
    else { err.textContent = 'Clave incorrecta. Probá de nuevo.'; inp.value=''; inp.focus(); }
  };
  btn.onclick = tryUnlock;
  inp.onkeydown = (e)=>{ if(e.key==='Enter') tryUnlock(); };
  document.getElementById('lockBack').onclick = ()=>{ROUTE.area='publico';ROUTE.tab='home';render();};
  inp.focus();
}

/* =========================================================
   PÚBLICO 1: Elegir las canciones de la próxima misa
========================================================= */
let CANCIONES_SELECCION = {};
let CANCIONES_ABIERTO = null;
let CANCIONES_INIT_ISO = null;
let CANCIONES_ULTIMA_INTERACCION = 0;

function miEleccionGuardada(iso){
  try{ return JSON.parse(localStorage.getItem('miseleccion_'+iso)) || null; }catch(e){ return null; }
}
function totalVotosMomento(iso, mo){
  const obj = DB.votos[iso] && DB.votos[iso][mo];
  if(!obj) return 0;
  return Object.values(obj).reduce((a,b)=>a+b,0);
}

function pageCancionesPublico(){
  const iso = proximoDomingoISO();
  const d = parseISO(iso);
  const dom = ensureDomingo(iso);

  // Cargar la elección previa una sola vez por domingo (no pisa lo que el usuario está editando ahora)
  if(CANCIONES_INIT_ISO !== iso){
    const previa = miEleccionGuardada(iso);
    CANCIONES_SELECCION = previa ? {...previa} : {};
    CANCIONES_ABIERTO = null;
    CANCIONES_INIT_ISO = iso;
  }

  const yaRespondio = !!miEleccionGuardada(iso);
  const elegidas = Object.keys(CANCIONES_SELECCION).length;

  return `
  ${volverHomeBtn()}
  <div class="page-head">
    <span class="eyebrow">Elegir canciones</span>
    <h2 class="script" style="font-size:30px;">Domingo ${fmtFecha(d)}</h2>
    <p>Elegí tu canción favorita para cada momento de la misa. ${elegidas}/${MOMENTOS_VOTABLES.length} elegidas.</p>
  </div>
  ${yaRespondio? `<div class="card" style="margin-bottom:14px;background:var(--verde-bg);border-color:transparent;"><strong style="color:var(--verde);">Ya enviaste tu respuesta — podés modificarla cuando quieras hasta el domingo.</strong></div>` : ''}
  <div style="display:flex;flex-direction:column;gap:12px;">
    ${MOMENTOS_VOTABLES.map(mo=>{
      const elegida = CANCIONES_SELECCION[mo];
      const cElegida = elegida ? DB.canciones.find(c=>c.id===elegida) : null;
      const abierto = CANCIONES_ABIERTO===mo;
      const totalVotos = totalVotosMomento(iso, mo);
      const cands = preseleccionDe(dom, mo).map(c=>({cancion:c, votos:votosDe(iso,mo,c.id)})).sort((a,b)=>b.votos-a.votos);
      const maxV = Math.max(1, ...cands.map(c=>c.votos));
      const todas = DB.canciones.filter(c=>c.momento===mo);
      return `
      <div class="card" style="padding:0;overflow:hidden;">
        <button class="momentoTile" data-toggle="${mo}">
          <span class="momentoTile-left">
            <span class="momentoTile-check ${cElegida?'done':''}">${cElegida? icon('check',16) : ''}</span>
            <span>
              <span class="momentoTile-tit">${LABEL_MOMENTO[mo]}</span>
              <span class="momentoTile-sub">${cElegida? cElegida.titulo : 'Tocá para elegir'}</span>
            </span>
          </span>
          <span style="color:var(--muted);">${abierto?'−':'+'}</span>
        </button>
        ${abierto? `
        <div style="padding:0 16px 16px;">
          ${totalVotos>0 ? `
          <div class="divider" style="margin:6px 0 10px;"><span>Las más votadas</span></div>
          ${cands.filter(x=>x.votos>0).map((x,i)=>`
            <div style="margin-bottom:8px;">
              <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px;"><span>${i===0?'🥇 ':''}${x.cancion.titulo}</span><span class="mono" style="color:var(--muted);">${x.votos}</span></div>
              <div class="barTrack"><div class="barFill ${i===0?'gold':''}" style="width:${Math.round((x.votos/maxV)*100)}%;"></div></div>
            </div>`).join('')}
          <div class="divider" style="margin:14px 0 8px;"><span>O elegí cualquier otra</span></div>
          ` : `
          <div class="card" style="background:var(--azul-bg);border-color:transparent;margin-top:10px;margin-bottom:12px;">
            <span style="font-size:12.5px;color:var(--azul-deep);">Todavía no hay votos para ${LABEL_MOMENTO[mo].toLowerCase()}. ¡Elegí la tuya y arrancá la votación!</span>
          </div>
          `}
          <select data-seltodas="${mo}">
            <option value="">— Elegí una canción de ${LABEL_MOMENTO[mo].toLowerCase()} —</option>
            ${todas.map(c=>`<option value="${c.id}" ${elegida===c.id?'selected':''}>${c.titulo}</option>`).join('')}
          </select>
        </div>` : ''}
      </div>`;
    }).join('')}
  </div>
  <button class="btn btn-primary" id="btnEnviarRespuesta" style="width:100%;justify-content:center;margin-top:18px;" ${elegidas<MOMENTOS_VOTABLES.length?'disabled':''}>
    ${yaRespondio ? 'Actualizar mi respuesta' : 'Enviar respuesta'} ${elegidas<MOMENTOS_VOTABLES.length? `(${elegidas}/${MOMENTOS_VOTABLES.length})`:''}
  </button>
  `;
}
function bind_publico_canciones(){
  bindVolverHome();
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{
    CANCIONES_ULTIMA_INTERACCION = Date.now();
    CANCIONES_ABIERTO = (CANCIONES_ABIERTO===b.dataset.toggle) ? null : b.dataset.toggle;
    renderPage();
  });
  document.querySelectorAll('[data-seltodas]').forEach(sel=>{
    sel.onfocus=()=>{ CANCIONES_ULTIMA_INTERACCION = Date.now(); };
    sel.onchange=()=>{
      CANCIONES_ULTIMA_INTERACCION = Date.now();
      const mo = sel.dataset.seltodas;
      if(sel.value){
        CANCIONES_SELECCION[mo] = sel.value;
      } else {
        delete CANCIONES_SELECCION[mo];
      }
      // La sección queda abierta: la persona ve su elección y puede cambiarla sin que el desplegable desaparezca
      renderPage();
    };
  });
  const btnEnviar = document.getElementById('btnEnviarRespuesta');
  if(btnEnviar) btnEnviar.onclick=()=>{
    if(Object.keys(CANCIONES_SELECCION).length < MOMENTOS_VOTABLES.length) return;
    const iso = proximoDomingoISO();
    if(!DB.votos[iso]) DB.votos[iso]={};
    const previa = miEleccionGuardada(iso);
    // Si ya había votado antes, le restamos su elección anterior antes de sumar la nueva
    if(previa){
      Object.entries(previa).forEach(([mo, cancionId])=>{
        if(DB.votos[iso][mo] && DB.votos[iso][mo][cancionId]){
          DB.votos[iso][mo][cancionId] = Math.max(0, DB.votos[iso][mo][cancionId]-1);
        }
      });
    }
    MOMENTOS_VOTABLES.forEach(mo=>{
      const cancionId = CANCIONES_SELECCION[mo];
      if(!DB.votos[iso][mo]) DB.votos[iso][mo]={};
      DB.votos[iso][mo][cancionId] = (DB.votos[iso][mo][cancionId]||0)+1;
    });
    saveDB(DB);
    localStorage.setItem('miseleccion_'+iso, JSON.stringify(CANCIONES_SELECCION));
    toast(previa ? '¡Tu respuesta fue actualizada! 🙏' : '¡Gracias por tu elección! 🙏');
    renderPage();
  };
}

function abrirOrganizarDomingo(iso){
  const dom = ensureDomingo(iso);
  const d = parseISO(iso);
  const ELIGIENDO_OTRA = {};
  const modal = document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(28,38,48,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;';
  const render = ()=>{
    const chk = chequeoMinimo(dom);
    modal.innerHTML = `
    <div class="card" style="max-width:600px;width:100%;max-height:90vh;overflow:auto;">
      <h3 style="color:var(--marino);">Domingo ${fmtFecha(d)}</h3>
      ${chk.ok
        ? `<div class="tag tag-verde" style="margin-top:8px;">✓ Equipo completo</div>`
        : `<div class="tag tag-rojo" style="margin-top:8px;">⚠ Faltan: ${chk.faltan.join(', ')}</div>`}

      <div class="divider"><span>Anotarse</span></div>
      ${(() => {
        const disponibles = DB.personas.filter(p=>!dom.asignaciones.some(a=>a.personaId===p.id));
        if(disponibles.length===0){
          return `<p style="font-size:13.5px;color:var(--muted);">Ya están anotadas todas las personas del coro para este domingo.</p>`;
        }
        return `
        <div class="grid2">
          <div><label>Persona</label><select id="selPersona">${disponibles.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}</select></div>
          <div><label>Rol ese domingo</label><select id="selRol">${ROLES.map(r=>`<option value="${r}">${r}</option>`).join('')}</select></div>
        </div>
        <button class="btn btn-primary btn-sm" id="btnAsignar" style="margin-top:10px;">+ Agregar al equipo</button>`;
      })()}

      <div class="divider"><span>Equipo anotado (${dom.asignaciones.length})</span></div>
      ${dom.asignaciones.length===0? `<p style="font-size:13.5px;color:var(--muted);">Todavía no hay nadie anotado.</p>` :
        dom.asignaciones.map((a,i)=>{
          const p = DB.personas.find(x=>x.id===a.personaId);
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);">
            <span>${p? p.nombre:'(eliminada)'} <span class="tag tag-azul" style="margin-left:6px;">${a.rol}</span></span>
            <button class="btn btn-sm btn-danger" data-quitar="${i}">Quitar</button>
          </div>`;
        }).join('')}

      <div class="divider"><span>Canciones de este domingo</span></div>
      ${MOMENTOS.map(mo=>{
        const esVotable = MOMENTOS_VOTABLES.includes(mo);
        const cands = DB.canciones.filter(c=>c.momento===mo);
        if(!esVotable){
          return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;">
            <span style="font-size:12.5px;font-weight:600;color:var(--azul-deep);min-width:120px;">${mo}</span>
            <select data-momento="${mo}" style="flex:1;">
              <option value="">— sin elegir —</option>
              ${cands.map(c=>`<option value="${c.id}" ${dom.canciones[mo]===c.id?'selected':''}>${c.titulo}</option>`).join('')}
            </select>
          </div>`;
        }
        const g = totalVotosMomento(iso, mo) > 0 ? ganadoraDe(iso, mo, dom) : null;
        const confirmada = dom.canciones[mo] ? DB.canciones.find(c=>c.id===dom.canciones[mo]) : null;
        const elgiendoOtra = ELIGIENDO_OTRA[mo];
        return `<div class="card" style="margin-bottom:10px;background:var(--bg);">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:12.5px;font-weight:700;color:var(--marino);">${mo}</span>
            <span class="tag tag-azul">Votación pública</span>
          </div>
          ${confirmada ? `
            <div style="font-size:14px;font-weight:600;margin-bottom:8px;">✓ Confirmada: ${confirmada.titulo}</div>
            <button class="btn btn-sm btn-outline" data-otra="${mo}">Elegir otra</button>
          ` : (elgiendoOtra ? `
            <select data-momento="${mo}" style="margin-bottom:0;">
              <option value="">— elegí una canción —</option>
              ${cands.map(c=>`<option value="${c.id}">${c.titulo}</option>`).join('')}
            </select>
          ` : `
            <div style="font-size:14px;margin-bottom:8px;">
              ${g ? `Más votada: <strong>${g.cancion.titulo}</strong> (${g.votos} voto${g.votos===1?'':'s'})` : `<span style="color:var(--muted);">Todavía no hay votos de los fieles para este momento.</span>`}
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              ${g? `<button class="btn btn-sm btn-primary" data-confirmar="${mo}|${g.cancion.id}">Confirmar</button>`:''}
              <button class="btn btn-sm btn-outline" data-otra="${mo}">Elegir otra</button>
            </div>
          `)}
        </div>`;
      }).join('')}
      <button class="btn btn-soft" style="width:100%;justify-content:center;margin-top:6px;" id="btnGuardarCanciones">Guardar canciones confirmadas</button>

      <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:14px;" id="closeModal2">Cerrar</button>
    </div>`;
    bindModal();
  };
  function bindModal(){
    const btnAsig = modal.querySelector('#btnAsignar');
    if(btnAsig) btnAsig.onclick=()=>{
      const personaId = modal.querySelector('#selPersona').value;
      const rol = modal.querySelector('#selRol').value;
      if(dom.asignaciones.some(a=>a.personaId===personaId)){
        toast('Esa persona ya está anotada este domingo');
        return;
      }
      dom.asignaciones.push({personaId, rol});
      saveDB(DB); render();
    };
    modal.querySelectorAll('[data-quitar]').forEach(b=>b.onclick=()=>{
      dom.asignaciones.splice(Number(b.dataset.quitar),1); saveDB(DB); render();
    });
    modal.querySelectorAll('[data-confirmar]').forEach(b=>b.onclick=()=>{
      const [mo, cancionId] = b.dataset.confirmar.split('|');
      dom.canciones[mo] = cancionId;
      saveDB(DB); render();
    });
    modal.querySelectorAll('[data-otra]').forEach(b=>b.onclick=()=>{
      const mo = b.dataset.otra;
      dom.canciones[mo] = null;
      ELIGIENDO_OTRA[mo] = true;
      saveDB(DB); render();
    });
    modal.querySelector('#btnGuardarCanciones').onclick=()=>{
      modal.querySelectorAll('[data-momento]').forEach(sel=>{
        if(sel.value){
          dom.canciones[sel.dataset.momento] = sel.value;
          ELIGIENDO_OTRA[sel.dataset.momento] = false;
        }
      });
      saveDB(DB); toast('Canciones guardadas ✓'); renderPage();
    };
    modal.querySelector('#closeModal2').onclick=()=>{ modal.remove(); renderPage(); };
    modal.onclick=(e)=>{ if(e.target===modal){ modal.remove(); renderPage(); } };
  }
  render();
  document.body.appendChild(modal);
}

/* ===== Carga masiva de canciones ===== */
function parseCargaMasiva(texto){
  const bloques = texto.split(/\n\s*-{3,}\s*\n/).map(b=>b.trim()).filter(Boolean);
  const resultados = [];
  bloques.forEach(b=>{
    const lines = b.split('\n');
    let titulo='', autor='', momento='', tono='';
    const letraLines = [];
    let enLetra = false;
    lines.forEach(line=>{
      if(!enLetra){
        const m = line.match(/^\s*(t[ií]tulo|autor|momento|tono)\s*:\s*(.*)$/i);
        if(m){
          const key = m[1].toLowerCase();
          const val = m[2].trim();
          if(key.startsWith('t') && key.length>4) titulo = val;
          else if(key==='autor') autor = val;
          else if(key==='momento') momento = val;
          else if(key==='tono') tono = val;
          return;
        }
        if(/^\s*letra\s*:?\s*$/i.test(line)){ enLetra = true; return; }
        if(line.trim()!==''){ enLetra = true; letraLines.push(line); return; }
      } else {
        letraLines.push(line);
      }
    });
    const momentoOk = MOMENTOS.find(m=>m.toLowerCase()===momento.trim().toLowerCase());
    resultados.push({
      titulo: titulo.trim(),
      autor: autor.trim(),
      momento: momentoOk || '',
      momentoOriginal: momento.trim(),
      tono: tono.trim(),
      letra: letraLines.join('\n').trim(),
    });
  });
  return resultados;
}

  modal.style.cssText='position:fixed;inset:0;background:rgba(28,38,48,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;';

  modal.innerHTML = `

    preview.innerHTML = `

function bind_privado_misa(){
  const sel = document.getElementById('misaSelDom');
  if(sel) sel.onchange=()=>{ MISA_DOM_ISO=sel.value; MISA_IDX=0; stopMisaScroll(); renderPage(); };
  document.querySelectorAll('[data-irmomento]').forEach(t=>t.onclick=()=>{ MISA_IDX=Number(t.dataset.irmomento); stopMisaScroll(); renderPage(); });
  const prev = document.getElementById('misaPrev'); if(prev) prev.onclick=()=>{ MISA_IDX--; stopMisaScroll(); renderPage(); };
  const next = document.getElementById('misaNext'); if(next) next.onclick=()=>{ MISA_IDX++; stopMisaScroll(); renderPage(); };
  const vel = document.getElementById('misaVelocidad');
  if(vel) vel.onchange=()=>{ MISA_SCROLL.velocidad=Number(vel.value); };
  const tog = document.getElementById('misaScrollToggle');
  if(tog) tog.onclick=()=>{
    MISA_SCROLL.activo ? stopMisaScroll() : startMisaScroll();
    document.getElementById('misaScrollToggle').textContent = MISA_SCROLL.activo? '⏸ Pausar letra':'▶ Mover letra sola';
  };
}
function startMisaScroll(){
  MISA_SCROLL.activo = true;
  const box = document.getElementById('misaScrollBox');
  if(!box) return;
  clearInterval(MISA_SCROLL.timer);
  MISA_SCROLL.timer = setInterval(()=>{
    if(!document.getElementById('misaScrollBox')){ stopMisaScroll(); return; }
    box.scrollTop += 1;
    if(box.scrollTop + box.clientHeight >= box.scrollHeight){ stopMisaScroll(); }
  }, Math.max(8, 60 - MISA_SCROLL.velocidad) * 2);
}
function stopMisaScroll(){ MISA_SCROLL.activo = false; clearInterval(MISA_SCROLL.timer); }

  const conteo = {};
  DB.domingos.forEach(d=>{ Object.values(d.canciones||{}).forEach(cidv=>{ if(cidv) conteo[cidv]=(conteo[cidv]||0)+1; }); });
  const ranking = Object.entries(conteo).map(([cidv,n])=>({cancion:DB.canciones.find(c=>c.id===cidv), veces:n})).filter(r=>r.cancion).sort((a,b)=>b.veces-a.veces);
  const maxVeces = Math.max(1, ...ranking.map(r=>r.veces));

  return `
  <div class="page-head">
    <span class="eyebrow">Espacio del coro</span>
    <h2>Estadísticas</h2>
    <p>Asistencia del equipo y canciones más cantadas, a partir de los domingos cargados en la agenda.</p>
  </div>
  <div class="divider"><span>Asistencia de los cantantes</span></div>
  ${asistencia.length===0 ? `<div class="empty"><h3>No hay datos todavía</h3></div>` :
    asistencia.map(a=>`
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;">${a.persona.nombre}</span>
          <span class="mono" style="font-size:12px;color:var(--muted);">${a.total} domingo${a.total===1?'':'s'}</span>
        </div>
        <div class="barTrack" style="margin-bottom:8px;"><div class="barFill" style="width:${Math.round((a.total/maxAsist)*100)}%;"></div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${Object.entries(a.roles).map(([rol,n])=>`<span class="tag tag-dorado">${rol} · ${n}</span>`).join('') || `<span style="font-size:12px;color:var(--muted);">Sin asignaciones registradas</span>`}
        </div>
      </div>
    `).join('')
  }
  <div class="divider"><span>Canciones más interpretadas</span></div>
  ${ranking.length===0 ? `<div class="empty"><h3>No hay datos todavía</h3><p>Se completa a medida que cargás canciones en cada domingo.</p></div>` :
    ranking.map((r,i)=>`
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;">${i+1}. ${r.cancion.titulo}</span>
          <span class="mono" style="font-size:12px;color:var(--muted);">${r.veces} vez${r.veces===1?'':'es'}</span>
        </div>
        <div class="barTrack"><div class="barFill gold" style="width:${Math.round((r.veces/maxVeces)*100)}%;"></div></div>
      </div>
    `).join('')
  }
  `;
}

render();
</script>
</body>
</html>
